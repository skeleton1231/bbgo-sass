services:
  manager:
    build:
      context: ..
      dockerfile: saas/docker/Dockerfile.manager
    container_name: bbgo-manager
    ports:
      - "8090:8090"
    volumes:
      - bbgo-data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - MANAGER_PORT=8090
      - DATA_DIR=/data
      - DOCKER_NETWORK=saas_bbgo-net
      - DATA_VOLUME=saas_bbgo-data
      - BBGO_IMAGE=bbgo-base:latest
      - BBGO_PORT=8080
      - BBGO_GRPC_PORT=9090
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
    networks:
      - bbgo-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    build:
      context: ../saas/web
      dockerfile: Dockerfile
    container_name: bbgo-web
    ports:
      - "3142:3000"
    environment:
      - NEXT_PUBLIC_SUPABASE_URL=${SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - MANAGER_API_URL=http://manager:8090
    depends_on:
      - manager
    networks:
      - bbgo-net
    restart: unless-stopped

networks:
  bbgo-net:
    driver: bridge

volumes:
  bbgo-data:
