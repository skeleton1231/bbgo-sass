services:
  marketdata:
    image: bbgo-base:latest
    container_name: bbgo-marketdata
    volumes:
      - bbgo-data:/data
      - ./docker/configs/marketdata.yaml:/config/bbgo.yaml:ro
    networks:
      - bbgo-net
    environment:
      - BINANCE_API_KEY=${BINANCE_API_KEY}
      - BINANCE_API_SECRET=${BINANCE_API_SECRET}
    command: ["run", "--config", "/config/bbgo.yaml", "--no-sync", "--enable-webserver", "--enable-grpc", "--grpc-bind", ":9090"]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  manager:
    build:
      context: ..
      dockerfile: saas/docker/Dockerfile.manager
    container_name: bbgo-manager
    ports:
      - "8090:8090"
    volumes:
      - bbgo-data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - MANAGER_PORT=8090
      - DATA_DIR=/data
      - DOCKER_NETWORK=saas_bbgo-net
      - DATA_VOLUME=saas_bbgo-data
      - BBGO_IMAGE=bbgo-base:latest
      - BBGO_PORT=8080
      - BBGO_GRPC_PORT=9090
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - SUPABASE_DB_URL=${SUPABASE_DB_URL}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - MANAGER_TOKEN=${MANAGER_TOKEN}
      - MARKETDATA_ADDR=bbgo-marketdata:9090
      - MARKETDATA_REST_ADDR=bbgo-marketdata:8080
    depends_on:
      marketdata:
        condition: service_healthy
    networks:
      - bbgo-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  web:
    build:
      context: ../saas/web
      dockerfile: Dockerfile
    container_name: bbgo-web
    ports:
      - "3142:3000"
    environment:
      - HOSTNAME=0.0.0.0
      - NEXT_PUBLIC_SUPABASE_URL=${SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - MANAGER_API_URL=http://manager:8090
      - MANAGER_TOKEN=${MANAGER_TOKEN}
      - MANAGER_WS_URL=ws://localhost:8090
    depends_on:
      manager:
        condition: service_healthy
    networks:
      - bbgo-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://0.0.0.0:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  caddy:
    image: caddy:2-alpine
    container_name: bbgo-caddy
    ports:
      - "80:80"
      - "443:443"
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      web:
        condition: service_healthy
    networks:
      - bbgo-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.25"

networks:
  bbgo-net:
    driver: bridge

volumes:
  bbgo-data:
  # caddy_data persists TLS certificates — back up for production
  caddy_data:
  caddy_config:
