services:
  marketdata:
    image: bbgo-base:latest
    container_name: bbgo-marketdata
    volumes:
      - bbgo-data:/data
      - ./docker/configs/marketdata.yaml:/config/bbgo.yaml:ro
    networks:
      - bbgo-net
    environment:
      - BINANCE_API_KEY=${BINANCE_API_KEY}
      - BINANCE_API_SECRET=${BINANCE_API_SECRET}
    command: ["run", "--config", "/config/bbgo.yaml", "--no-sync", "--enable-webserver", "--enable-grpc", "--grpc-bind", ":9090"]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  marketdata-testnet:
    image: bbgo-base:latest
    container_name: bbgo-marketdata-testnet
    volumes:
      - bbgo-data:/data
      - ./docker/configs/marketdata-testnet.yaml:/config/bbgo.yaml:ro
    networks:
      - bbgo-net
    environment:
      - BINANCE_TESTNET=1
    command: ["run", "--config", "/config/bbgo.yaml", "--no-sync", "--enable-webserver", "--enable-grpc", "--grpc-bind", ":9090"]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  manager:
    build:
      context: ..
      dockerfile: saas/docker/Dockerfile.manager
    container_name: bbgo-manager
    ports:
      - "8090:8090"
    volumes:
      - bbgo-data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - MANAGER_PORT=8090
      - DATA_DIR=/data
      - DOCKER_NETWORK=saas_bbgo-net
      - DATA_VOLUME=saas_bbgo-data
      - BBGO_IMAGE=bbgo-base:latest
      - BBGO_PORT=8080
      - BBGO_GRPC_PORT=9090
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - SUPABASE_DB_URL=${SUPABASE_DB_URL}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - MANAGER_TOKEN=${MANAGER_TOKEN}
      - MARKETDATA_ADDR=bbgo-marketdata:9090
      - MARKETDATA_REST_ADDR=bbgo-marketdata:8080
      - MARKETDATA_TESTNET_ADDR=bbgo-marketdata-testnet:9090
      - MARKETDATA_TESTNET_REST_ADDR=bbgo-marketdata-testnet:8080
    depends_on:
      marketdata:
        condition: service_healthy
      marketdata-testnet:
        condition: service_healthy
    networks:
      - bbgo-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  bbgo-net:
    driver: bridge

volumes:
  bbgo-data:
