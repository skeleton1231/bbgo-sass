# Production-grade docker-compose for BBGO SaaS.
#
# Brings up the full stack: web (Next.js standalone) + manager + marketdata +
# Caddy (auto-HTTPS) + non-root containers + healthchecks + resource limits.
#
# Usage:
#   1. Build images:      docker compose -f saas/docker/docker-compose.prod.yml build
#   2. Configure env:     cp saas/.env.production.example saas/.env.prod
#   3. Launch:            docker compose -f saas/docker/docker-compose.prod.yml --env-file saas/.env.prod up -d
#   4. Verify:            curl -fsS https://${DOMAIN}/api/health
#
# This file overrides nothing — bring it up directly. The dev compose at
# saas/docker-compose.yml remains for local-only workflows.

services:
  marketdata:
    image: ${BBGO_BASE_IMAGE:-bbgo-base:latest}
    container_name: bbgo-marketdata
    volumes:
      - marketdata-cache:/data
      - ./configs/marketdata.yaml:/config/bbgo.yaml:ro
    networks:
      - bbgo-net
    environment:
      - BINANCE_API_KEY=${BINANCE_API_KEY}
      - BINANCE_API_SECRET=${BINANCE_API_SECRET}
      - KLINE_DB_PATH=/data/klines.sqlite3
      - LOG_FORMAT=json
      - LOG_LEVEL=info
    command: ["run", "--config", "/config/bbgo.yaml", "--no-sync", "--enable-webserver", "--enable-grpc", "--grpc-bind", ":9090"]
    restart: unless-stopped
    user: "10001:10001"
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: "1.0"
        reservations:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/api/ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  manager:
    image: ${MANAGER_IMAGE:-bbgo-manager:latest}
    build:
      context: ../..
      dockerfile: saas/docker/Dockerfile.manager
    container_name: bbgo-manager
    volumes:
      - bbgo-data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - bbgo-net
    environment:
      - MANAGER_PORT=8090
      - DATA_DIR=/data
      - DOCKER_NETWORK=saas_bbgo-net
      - DATA_VOLUME=saas_bbgo-data
      - BBGO_IMAGE=${BBGO_BASE_IMAGE:-bbgo-base:latest}
      - BBGO_PORT=8080
      - BBGO_GRPC_PORT=9090
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - SUPABASE_DB_URL=${SUPABASE_DB_URL}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - MANAGER_TOKEN=${MANAGER_TOKEN}
      - MARKETDATA_ADDR=bbgo-marketdata:9090
      - MARKETDATA_REST_ADDR=bbgo-marketdata:8080
      - LOG_FORMAT=json
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - BUILD_VERSION=${BUILD_VERSION:-prod}
    depends_on:
      marketdata:
        condition: service_healthy
    restart: unless-stopped
    # Manager must run as root to access /var/run/docker.sock. Tighten by
    # creating a dedicated docker group on the host and chmod-ing the socket.
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.5"
        reservations:
          memory: 384M
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8090/readyz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  web:
    image: ${WEB_IMAGE:-bbgo-web:latest}
    build:
      context: ../web
      dockerfile: Dockerfile
    container_name: bbgo-web
    networks:
      - bbgo-net
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - MANAGER_API_URL=http://manager:8090
      - MANAGER_TOKEN=${MANAGER_TOKEN}
      - PORT=3000
    depends_on:
      manager:
        condition: service_healthy
    restart: unless-stopped
    user: "10001:10001"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  caddy:
    image: caddy:2-alpine
    container_name: bbgo-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      - DOMAIN=${DOMAIN}
      - SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - ACME_EMAIL=${ACME_EMAIL}
    networks:
      - bbgo-net
    depends_on:
      - web
      - manager
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:2019/config/"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  bbgo-net:
    name: saas_bbgo-net
    driver: bridge

volumes:
  bbgo-data:
    name: saas_bbgo-data
  marketdata-cache:
    name: saas_marketdata-cache
  caddy-data:
  caddy-config:
